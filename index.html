<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Antle Ventures</title>
  <meta name="description" content="Antle Ventures builds apps, websites, and digital products." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Antle Ventures" />
  <meta property="og:description" content="Antle Ventures builds apps, websites, and digital products." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f8f9fb;
      color: #111827;
      line-height: 1.5;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem 1rem;
      text-align: center;
    }

    .content {
      max-width: 42rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3rem);
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    p {
      margin: 0.85rem 0 0;
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      color: #374151;
    }

    .contact {
      margin-top: 0.9rem;
      font-size: 1rem;
      color: #111827;
    }

    a {
      color: inherit;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.15em;
    }

    footer {
      padding: 1rem 1.25rem 1.25rem;
      text-align: center;
      font-size: 0.75rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main>
    <section class="content" aria-label="Business information">
      <h1>Antle Ventures</h1>
      <p>Building apps, websites, and digital products.</p>
      <p class="contact">Contact: <a href="mailto:andy@antleventures.com">andy@antleventures.com</a></p>
    </section>
  </main>
  <footer>© 2026 Antle Ventures</footer>
</body>
</html>
